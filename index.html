<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>由小柳主宰的世界</title>
    <style>
      :root {
        --text: #4b4454;
        --muted: #7e7688;
        --line: #ece2f0;
        --panel: #fffdfbcc;
        --pink: #e6c3cf;
        --taro: #cec2e8;
        --apricot: #efdcc7;
      }

      * { box-sizing: border-box; }
      html, body { margin: 0; min-height: 100%; }
      body {
        color: var(--text);
        font-family: "Noto Serif SC", "PingFang SC", "Microsoft YaHei", serif;
        overflow-x: hidden;
        background:
          radial-gradient(circle at 15% 15%, #f3dce5 0%, transparent 36%),
          radial-gradient(circle at 86% 10%, #ddd5ef 0%, transparent 32%),
          linear-gradient(180deg, #fdfbf8, #faf3f7 56%, #f9f6ef);
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: -1;
      }

      body::before {
        background:
          repeating-linear-gradient(
            104deg,
            rgba(255, 255, 255, 0) 0,
            rgba(255, 255, 255, 0) 7px,
            rgba(255, 255, 255, 0.24) 8px,
            rgba(255, 255, 255, 0.24) 9px
          ),
          radial-gradient(circle at 75% 20%, rgba(255, 248, 210, 0.25) 0, rgba(255, 248, 210, 0) 18%),
          radial-gradient(circle at 22% 72%, rgba(255, 230, 238, 0.2) 0, rgba(255, 230, 238, 0) 20%);
        animation: rainShift 14s linear infinite;
      }

      body::after {
        background:
          radial-gradient(circle at 40% 120%, rgba(124, 107, 123, 0.13) 0, rgba(124, 107, 123, 0) 45%),
          linear-gradient(180deg, rgba(80, 67, 84, 0) 72%, rgba(80, 67, 84, 0.08) 100%);
      }

      .screen {
        min-height: 100vh;
        width: 100%;
      }

      #selectScreen {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 16px;
      }

      .hidden { display: none; }

      .welcome {
        display: grid;
        place-items: center;
        padding: 20px;
      }

      .welcome-inner {
        text-align: center;
        max-width: 900px;
        animation: fadeRise 0.9s ease both;
      }

      .welcome-title {
        margin: 0;
        font-size: clamp(38px, 6vw, 62px);
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .title-glow {
        background: linear-gradient(90deg, #cf9fac, #b9acdf 58%, #e1bda7);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 26px rgba(208, 177, 194, 0.34);
      }

      .welcome-sub {
        margin: 16px auto 0;
        font-size: clamp(15px, 2vw, 18px);
        color: var(--muted);
        letter-spacing: 0.08em;
        max-width: 700px;
        animation: fadeRise 1.2s ease both;
      }

      .enter-btn {
        margin-top: 28px;
        border: none;
        border-radius: 14px;
        padding: 12px 26px;
        font-size: 16px;
        font-weight: 700;
        color: #4f4759;
        background: linear-gradient(90deg, #e3bfcc, #cdc1e7);
        box-shadow: 0 12px 24px rgba(174, 150, 168, 0.24);
        cursor: pointer;
        transition: transform 0.24s ease, filter 0.24s ease, box-shadow 0.24s ease;
        animation: fadeRise 1.5s ease both;
      }

      .enter-btn:hover {
        transform: translateY(-2px) scale(1.02);
        filter: brightness(0.96);
        box-shadow: 0 16px 30px rgba(174, 150, 168, 0.32);
      }

      .page {
        width: min(1080px, 100%);
        margin: 0 auto;
        border: 1px solid rgba(236, 226, 240, 0.82);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: 0 28px 56px rgba(144, 122, 137, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.76);
        backdrop-filter: blur(14px) saturate(120%);
        overflow: visible;
        position: relative;
      }

      .page::before,
      .page::after {
        content: "";
        position: absolute;
        pointer-events: none;
        z-index: 0;
      }

      .page::before {
        width: 280px;
        height: 280px;
        right: -90px;
        top: -90px;
        border-radius: 999px;
        background: radial-gradient(circle at 30% 30%, rgba(233, 203, 218, 0.4), rgba(233, 203, 218, 0));
      }

      .page::after {
        width: 240px;
        height: 240px;
        left: -80px;
        bottom: -110px;
        border-radius: 999px;
        background: radial-gradient(circle at 70% 30%, rgba(206, 194, 232, 0.38), rgba(206, 194, 232, 0));
      }

      .top,
      #selectView,
      .story,
      .ending {
        position: relative;
        z-index: 1;
      }

      .top {
        text-align: center;
        padding: 24px 22px 18px;
        border-bottom: 1px solid var(--line);
        animation: fadeRise 0.7s ease both;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0));
      }

      .game-title {
        margin: 0;
        font-size: clamp(30px, 5vw, 54px);
        font-weight: 700;
        letter-spacing: 0.06em;
      }

      .title-line {
        width: min(420px, 70%);
        margin: 10px auto 8px;
        height: 1px;
        background: linear-gradient(90deg, rgba(230, 195, 207, 0), rgba(206, 194, 232, 0.9), rgba(230, 195, 207, 0));
      }

      .quote {
        margin: 8px auto 0;
        max-width: 760px;
        font-size: 13px;
        color: var(--muted);
        letter-spacing: 0.08em;
      }

      .selector-wrap {
        text-align: center;
        padding: 18px 20px 14px;
      }

      .world-hud {
        width: min(760px, 92%);
        margin: 0 auto 12px;
        background: #ffffffb8;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 10px 12px;
      }

      .hud-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
      }

      .hud-actions {
        margin-top: 8px;
        display: flex;
        justify-content: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .mini-btn {
        border: 1px solid #e9deee;
        background: #fff;
        color: #625a6f;
        border-radius: 10px;
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
      }

      .pill {
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        background: #f8f3fb;
        border: 1px solid #e9deee;
      }

      .progress {
        margin-top: 8px;
        height: 8px;
        border-radius: 999px;
        background: #f0e8f4;
        overflow: hidden;
      }

      .progress-inner {
        width: 0;
        height: 100%;
        background: linear-gradient(90deg, #e4c1ce, #cdc1e7);
        transition: width 0.3s ease;
      }

      .toggle {
        border: none;
        background: transparent;
        color: #655d70;
        cursor: pointer;
        display: inline-flex;
        flex-direction: column;
        gap: 6px;
        align-items: center;
      }

      .toggle-arrow {
        width: 0;
        height: 0;
        border-left: 11px solid transparent;
        border-right: 11px solid transparent;
        border-top: 15px solid #bcaed6;
        transition: transform 0.3s ease, filter 0.3s ease;
      }

      .toggle.open .toggle-arrow {
        transform: rotate(180deg);
        filter: brightness(0.9);
      }

      .toggle small {
        color: #7f7789;
        letter-spacing: 0.06em;
      }

      .cards-zone {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.42s ease, opacity 0.35s ease;
        opacity: 0;
        padding: 0 22px;
      }

      .cards-zone.open {
        max-height: 900px;
        opacity: 1;
        padding-bottom: 28px;
      }

      .gallery {
        display: none;
        padding: 12px 18px 20px;
      }

      .gallery h3 {
        margin: 6px 0 12px;
        font-size: 20px;
      }

      .gallery-tools {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }

      .gallery-stats {
        margin: 0 0 10px;
        font-size: 13px;
        color: #6f697b;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .gallery-progress {
        margin: 0 0 14px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .progress-ring {
        width: 68px;
        height: 68px;
        border-radius: 999px;
        background: conic-gradient(#d7c6e8 0deg, #f1e8f6 0deg 360deg);
        display: grid;
        place-items: center;
        box-shadow: inset 0 1px 0 #ffffff;
      }

      .progress-ring::after {
        content: "";
        width: 50px;
        height: 50px;
        border-radius: 999px;
        background: #fff;
        border: 1px solid #efe4f3;
        position: absolute;
      }

      .progress-ring-value {
        position: relative;
        z-index: 1;
        font-size: 12px;
        color: #625a6f;
        font-weight: 700;
      }

      .progress-ring-note {
        font-size: 12px;
        color: #746e7f;
      }

      .gallery-tools select,
      .gallery-tools button {
        border: 1px solid #e9deee;
        background: #fff;
        color: #625a6f;
        border-radius: 10px;
        padding: 6px 10px;
        font-size: 12px;
      }

      .gallery-tools button.active {
        background: linear-gradient(90deg, #e4c1ce, #cdc1e7);
        color: #4a4353;
        font-weight: 700;
      }

      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 12px;
      }

      .ending-card {
        border: 1px solid var(--line);
        background: #fff;
        border-radius: 14px;
        padding: 12px;
      }

      .ending-card h4 {
        margin: 0 0 8px;
        font-size: 15px;
      }

      .ending-card p {
        margin: 0;
        font-size: 13px;
        line-height: 1.65;
        color: #696474;
      }

      .ending-card.locked {
        opacity: 0.68;
        background: #faf7fb;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .card {
        position: relative;
        border: 1px solid transparent;
        border-radius: 22px;
        background:
          linear-gradient(#fffcfb, #fffcfb) padding-box,
          linear-gradient(120deg, rgba(230, 195, 207, 0.72), rgba(206, 194, 232, 0.72)) border-box;
        padding: 16px 16px 16px 20px;
        box-shadow: 0 14px 24px rgba(175, 152, 165, 0.16), inset 0 1px 0 rgba(255, 255, 255, 0.84);
        transition: transform 0.24s ease, box-shadow 0.24s ease;
        opacity: 0;
        transform: translateY(14px);
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 6px;
        background: linear-gradient(180deg, #e5c0ce, #cec2e8);
        opacity: 0.72;
      }

      .card::after {
        content: "";
        position: absolute;
        right: -30px;
        top: -26px;
        width: 110px;
        height: 110px;
        border-radius: 999px;
        background: radial-gradient(circle at 30% 30%, rgba(247, 224, 232, 0.7), rgba(247, 224, 232, 0));
      }

      .cards-zone.open .card {
        animation: cardIn 0.5s ease forwards;
      }

      .cards-zone.open .card:nth-child(1) { animation-delay: 0.06s; }
      .cards-zone.open .card:nth-child(2) { animation-delay: 0.16s; }
      .cards-zone.open .card:nth-child(3) { animation-delay: 0.26s; }
      .cards-zone.open .card:nth-child(4) { animation-delay: 0.36s; }

      .card:hover { transform: translateY(-5px) scale(1.01); box-shadow: 0 18px 30px rgba(171, 144, 161, 0.26); }

      .scene-icon {
        position: absolute;
        right: 14px;
        top: 12px;
        font-size: 22px;
        opacity: 0.22;
        transform: translateY(4px);
        transition: opacity 0.24s ease, transform 0.24s ease;
      }

      .card:hover .scene-icon { opacity: 0.55; transform: translateY(0); }

      .tag {
        display: inline-block;
        padding: 5px 11px;
        border-radius: 999px;
        font-size: 12px;
        transition: filter 0.2s ease, transform 0.2s ease;
      }

      .tag-main { background: #eed1d9; }
      .tag-side { background: #d7cde9; }
      .tag-special { background: #efdecc; }
      .card:hover .tag { filter: saturate(115%); transform: translateY(-1px); }

      .card h3 {
        margin: 8px 0 8px;
        font-size: clamp(20px, 2.5vw, 24px);
        letter-spacing: 0.02em;
      }

      .card p {
        margin: 0 0 14px;
        color: #696474;
        line-height: 1.75;
        font-size: 14px;
        max-width: 92%;
      }
      .card.done h3::after {
        content: " 已解锁";
        font-size: 13px;
        color: #8e7fa2;
      }
      .card button {
        width: min(220px, 100%);
        border: none;
        border-radius: 14px;
        padding: 11px 12px;
        cursor: pointer;
        background: linear-gradient(90deg, #e4c1ce, #cdc1e7);
        color: #4a4353;
        font-weight: 700;
        transition: transform 0.2s ease, filter 0.2s ease;
      }

      .card button:hover { filter: brightness(0.95); transform: scale(1.02); }

      .story {
        display: none;
        padding: 16px 18px 24px;
        animation: fadeRise 0.45s ease both;
      }

      .story-top {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 6px 8px 14px;
        border-bottom: 1px solid var(--line);
      }

      .scene-title { margin: 0; font-size: clamp(20px, 3.2vw, 30px); }

      .scene-role {
        margin: 6px 8px 0;
        font-size: 13px;
        color: #756f80;
        letter-spacing: 0.03em;
      }

      .scene-path {
        margin: 4px 8px 0;
        font-size: 12px;
        color: #8a8394;
        letter-spacing: 0.02em;
      }

      .plain-btn {
        border: 1px solid var(--line);
        background: #fff;
        color: #595262;
        border-radius: 10px;
        padding: 8px 12px;
        cursor: pointer;
      }

      .narrative {
        margin: 16px 6px;
        line-height: 1.9;
        color: #534d5f;
        min-height: 104px;
        white-space: pre-line;
        padding: 12px 14px;
        border: 1px dashed #e9deee;
        border-radius: 12px;
        background: #fffdfd;
      }

      .bubble-wrap { display: grid; gap: 10px; margin: 10px 0 16px; }
      .bubble {
        padding: 10px 12px;
        border-radius: 12px;
        max-width: 92%;
        border: 1px solid var(--line);
        background: #fff;
      }

      .speaker {
        display: block;
        font-size: 12px;
        color: #7c7486;
        margin-bottom: 4px;
      }

      .bubble.me { margin-left: auto; background: #fff2f8; }
      .bubble.npc { background: #f6f3ff; }

      .choices { display: grid; gap: 10px; }
      .choice {
        border: 1px solid #eadfeb;
        border-radius: 12px;
        padding: 11px 12px;
        text-align: left;
        cursor: pointer;
        color: #50495a;
      }

      .c-empathy { background: #efd2dc; }
      .c-logic { background: #d8d2eb; }
      .c-rebel { background: #efe0cf; }

      .ending {
        display: none;
        padding: 20px;
        min-height: 520px;
        background: linear-gradient(180deg, #fffefc, #fff4fa 55%, #fff8ef);
        animation: fadeRise 0.45s ease both;
      }

      .end-art {
        width: 100%;
        height: 220px;
        border-radius: 16px;
        border: 1px solid var(--line);
        background:
          radial-gradient(circle at 30% 30%, #efd0db 0%, transparent 25%),
          radial-gradient(circle at 68% 30%, #d8cfeb 0%, transparent 25%),
          linear-gradient(180deg, #fff, #fff4fb 58%, #fff8f0);
        position: relative;
        overflow: hidden;
      }

      .end-art-icon {
        position: absolute;
        right: 16px;
        bottom: 14px;
        z-index: 2;
        font-size: 30px;
        line-height: 1;
        opacity: 0.42;
        filter: drop-shadow(0 6px 10px rgba(140, 118, 142, 0.22));
        user-select: none;
      }

      .end-art.theme-rain {
        background:
          repeating-linear-gradient(
            102deg,
            rgba(255, 255, 255, 0) 0,
            rgba(255, 255, 255, 0) 8px,
            rgba(223, 233, 255, 0.5) 9px,
            rgba(223, 233, 255, 0.5) 10px
          ),
          radial-gradient(circle at 68% 24%, rgba(213, 225, 255, 0.7) 0%, rgba(213, 225, 255, 0) 34%),
          linear-gradient(180deg, #f8fbff, #eef4ff 62%, #f7f2ff);
      }

      .end-art.theme-letter {
        background:
          linear-gradient(transparent 23px, rgba(236, 220, 206, 0.32) 24px),
          linear-gradient(90deg, rgba(236, 205, 215, 0.45), rgba(255, 246, 233, 0.66)),
          #fffaf3;
        background-size: 100% 24px, 100% 100%, auto;
      }

      .end-art.theme-night {
        background:
          radial-gradient(circle at 22% 26%, rgba(255, 237, 188, 0.45) 0%, rgba(255, 237, 188, 0) 25%),
          radial-gradient(circle at 78% 30%, rgba(206, 194, 232, 0.5) 0%, rgba(206, 194, 232, 0) 32%),
          linear-gradient(180deg, #f2effd, #ece7fb 60%, #f6f1ff);
      }

      .end-art.theme-dawn {
        background:
          radial-gradient(circle at 50% 38%, rgba(255, 221, 178, 0.66) 0%, rgba(255, 221, 178, 0) 32%),
          linear-gradient(180deg, #fff7ee, #ffeede 50%, #fff6f0);
      }

      .end-art.theme-true {
        background:
          radial-gradient(circle at 25% 34%, rgba(216, 195, 255, 0.52) 0%, rgba(216, 195, 255, 0) 30%),
          radial-gradient(circle at 78% 28%, rgba(255, 213, 230, 0.56) 0%, rgba(255, 213, 230, 0) 34%),
          linear-gradient(180deg, #fffafd, #f8efff 55%, #fff6f8);
      }

      .end-art.theme-rain-heal {
        background:
          radial-gradient(circle at 50% 40%, rgba(196, 221, 255, 0.6) 0%, rgba(196, 221, 255, 0) 30%),
          repeating-linear-gradient(100deg, rgba(255, 255, 255, 0) 0, rgba(255, 255, 255, 0) 8px, rgba(215, 232, 255, 0.52) 9px, rgba(215, 232, 255, 0.52) 10px),
          linear-gradient(180deg, #f7fbff, #edf4ff 62%, #fef7ff);
      }

      .end-art.theme-rain-deep {
        background:
          radial-gradient(circle at 75% 25%, rgba(173, 198, 236, 0.55) 0%, rgba(173, 198, 236, 0) 28%),
          repeating-linear-gradient(102deg, rgba(255, 255, 255, 0) 0, rgba(255, 255, 255, 0) 6px, rgba(194, 213, 243, 0.62) 7px, rgba(194, 213, 243, 0.62) 8px),
          linear-gradient(180deg, #eef4ff, #e6edfb 62%, #f4ecff);
      }

      .end-art.theme-letter-warm {
        background:
          linear-gradient(transparent 24px, rgba(236, 220, 206, 0.3) 24px),
          radial-gradient(circle at 80% 24%, rgba(255, 221, 190, 0.48) 0%, rgba(255, 221, 190, 0) 34%),
          linear-gradient(90deg, #fff7ef, #fffaf6);
        background-size: 100% 24px, 100% 100%, auto;
      }

      .end-art.theme-letter-cool {
        background:
          linear-gradient(transparent 24px, rgba(215, 214, 238, 0.26) 24px),
          radial-gradient(circle at 20% 30%, rgba(211, 202, 240, 0.5) 0%, rgba(211, 202, 240, 0) 32%),
          linear-gradient(90deg, #f9f6ff, #fdfbff);
        background-size: 100% 24px, 100% 100%, auto;
      }

      .end-art.theme-city-light {
        background:
          radial-gradient(circle at 22% 26%, rgba(255, 234, 176, 0.55) 0%, rgba(255, 234, 176, 0) 26%),
          radial-gradient(circle at 82% 30%, rgba(206, 194, 232, 0.52) 0%, rgba(206, 194, 232, 0) 34%),
          linear-gradient(180deg, #f2effd, #ebe7f8 58%, #f7f3ff);
      }

      .end-art.theme-city-glow {
        background:
          radial-gradient(circle at 30% 24%, rgba(255, 219, 195, 0.58) 0%, rgba(255, 219, 195, 0) 26%),
          radial-gradient(circle at 70% 36%, rgba(246, 196, 225, 0.42) 0%, rgba(246, 196, 225, 0) 36%),
          linear-gradient(180deg, #fff5f0, #fdf0fb 58%, #fff8f2);
      }

      .end-art.theme-dawn-gold {
        background:
          radial-gradient(circle at 50% 35%, rgba(255, 211, 148, 0.7) 0%, rgba(255, 211, 148, 0) 34%),
          linear-gradient(180deg, #fff8ef, #ffefd8 52%, #fff6ea);
      }

      .end-art.theme-dawn-rose {
        background:
          radial-gradient(circle at 50% 40%, rgba(255, 199, 208, 0.65) 0%, rgba(255, 199, 208, 0) 34%),
          linear-gradient(180deg, #fff7f9, #ffeef3 55%, #fff8f1);
      }

      .end-art.theme-archive {
        background:
          linear-gradient(transparent 22px, rgba(226, 217, 204, 0.22) 22px),
          radial-gradient(circle at 18% 24%, rgba(214, 202, 229, 0.48) 0%, rgba(214, 202, 229, 0) 32%),
          linear-gradient(90deg, #faf7f1, #fffcf8);
        background-size: 100% 22px, 100% 100%, auto;
      }

      .end-art::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 58%;
        transform: translate(-50%, -50%);
        width: 82px;
        height: 82px;
        border-radius: 999px;
        background: radial-gradient(circle at 35% 35%, #fff, #f0d4e0);
        box-shadow: 0 0 0 12px #ffffffaa;
      }

      .end-title { margin: 16px 0 10px; font-size: clamp(26px, 4vw, 42px); }
      .end-text { color: #5e576a; line-height: 1.95; white-space: pre-line; }
      .end-actions { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }

      .fade-out-up { animation: fadeOutUp 0.5s ease both; }
      .fade-in-up { animation: fadeRise 0.6s ease both; }

      @keyframes rainShift {
        0% { transform: translateY(0); opacity: 0.45; }
        50% { transform: translateY(8px); opacity: 0.62; }
        100% { transform: translateY(0); opacity: 0.45; }
      }

      @keyframes cardIn {
        from { opacity: 0; transform: translateY(14px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes fadeRise {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes fadeOutUp {
        from { opacity: 1; transform: translateY(0); }
        to { opacity: 0; transform: translateY(-18px); }
      }

      @media (max-width: 680px) {
        #selectScreen { padding: 10px; }
        .page {
          width: 100%;
          border-radius: 18px;
        }
        .top { padding: 16px; }
        .story { padding: 12px; }
        .cards-zone { padding: 0 14px; }
        .card p { max-width: 100%; }
        .card button { width: 100%; }
        .end-art { height: 170px; }
      }
    </style>

      function saveState() {

          unlockedEndings: Array.from(worldState.unlockedEndings),

          trueEndUnlocked: worldState.trueEndUnlocked

        localStorage.setItem(STORE_KEY, JSON.stringify(payload));

        if (!raw) return;
        try {
          const data = JSON.parse(raw);
          worldState.empathy = Number(data.empathy) || 0;
          worldState.logic = Number(data.logic) || 0;
          worldState.rebel = Number(data.rebel) || 0;
          worldState.unlockedScenes = new Set(Array.isArray(data.unlockedScenes) ? data.unlockedScenes : []);
          worldState.unlockedEndings = new Set(Array.isArray(data.unlockedEndings) ? data.unlockedEndings : []);
          worldState.whiteUmbrellaMet = Boolean(data.whiteUmbrellaMet);
          worldState.trueEndUnlocked = Boolean(data.trueEndUnlocked);
        } catch (_e) {
          localStorage.removeItem(STORE_KEY);
        }
      }

              sceneId: scene.id,

        const mainUnlocked = mainEndings.filter((item) => worldState.unlockedEndings.has(item.id)).length;
        const trueEndings = fullEndings.filter((item) => item.isTrueEnding);
        const trueUnlocked = trueEndings.filter((item) => worldState.unlockedEndings.has(item.id)).length;
        const percent = total > 0 ? Math.round((unlocked / total) * 100) : 0;
        const degree = Math.round((percent / 100) * 360);

        progressRingNote.textContent = `当前完成度 ${unlocked}/${total}`;

        let allEndings = fullEndings;
        if (galleryState.sceneId !== "all") {

        }

        galleryGrid.innerHTML = allEndings
          .map((item) => {
            const unlocked = worldState.unlockedEndings.has(item.id);
            return `
              <article class="ending-card ${unlocked ? "" : "locked"}">
                <h4>${unlocked ? item.title : "未解锁结局"}</h4>
                <p>${unlocked ? item.text : `来自：${item.sceneName}`}</p>
              </article>
            `;
          })
          .join("");
      }

      function tryUnlockTrueEnding() {
        const balanced =
          worldState.empathy >= 3 &&
          worldState.logic >= 3 &&
          worldState.rebel >= 3 &&
          Math.abs(worldState.empathy - worldState.logic) <= 2 &&
          Math.abs(worldState.logic - worldState.rebel) <= 2;
        const ready = worldState.unlockedScenes.size === 5 && balanced;
        if (ready && !worldState.trueEndUnlocked) {
          worldState.trueEndUnlocked = true;
          scenes.push(hiddenScene);
          renderCards();
          renderGallery();
        }
      }

      function renderCards() {
        homeEl.innerHTML = scenes
          .map(
            (s) => `
              <article class="card">
                <span class="scene-icon" aria-hidden="true">${s.icon || ""}</span>
                <h3>${s.name}</h3>
                <p>${s.short}</p>
                <button data-id="${s.id}">进入剧情线</button>
              </article>
            `
          )
          .join("");

        homeEl.querySelectorAll(".card").forEach((card, index) => {
          const sceneId = scenes[index]?.id;
          if (sceneId && worldState.unlockedScenes.has(sceneId)) {
            card.classList.add("done");
          }
        });

        homeEl.querySelectorAll("button[data-id]").forEach((btn) => {
          btn.addEventListener("click", () => startScene(btn.dataset.id));
        });
      }

      function openCards() {
        cardsOpen = true;
        cardsZone.classList.add("open");
        toggleScenes.classList.add("open");
        toggleScenes.setAttribute("aria-expanded", "true");
      }

      function closeCards() {
        cardsOpen = false;
        cardsZone.classList.remove("open");
        toggleScenes.classList.remove("open");
        toggleScenes.setAttribute("aria-expanded", "false");
      }

      function toggleCards() {
        if (cardsOpen) {
          closeCards();
        } else {
          openCards();
        }
      }

      function toSelectScreen() {
        hasEnteredFromHome = true;
        welcomeScreen.classList.add("fade-out-up");
        setTimeout(() => {
          welcomeScreen.classList.add("hidden");
          selectScreen.classList.remove("hidden");
          selectScreen.classList.add("fade-in-up");
          setTimeout(() => {
            selectScreen.classList.remove("fade-in-up");
          }, 580);
        }, 420);
      }

      let typeTimer = null;
      function typeWriter(text, speed = 20) {
        if (typeTimer) clearInterval(typeTimer);
        narrativeEl.textContent = "";
        let idx = 0;
        typeTimer = setInterval(() => {
          narrativeEl.textContent += text[idx] || "";
          idx += 1;
          if (idx >= text.length) clearInterval(typeTimer);
        }, speed);
      }

      function showSelectView() {
        if (!hasEnteredFromHome) return;
        storyEl.style.display = "none";
        endingEl.style.display = "none";
        galleryView.style.display = "none";
        selectView.style.display = "block";
      }

      function showGalleryView() {
        if (!hasEnteredFromHome) return;
        storyEl.style.display = "none";
        endingEl.style.display = "none";
        selectView.style.display = "block";
        galleryView.style.display = "block";
        renderSceneFilterOptions();
        renderGallery();
      }

      function renderSceneNode(scene, nodeKey) {
        const node = scene.nodes[nodeKey];
        if (!node) return;
        currentNodeKey = nodeKey;

        if (scene.id === "crossroad" && nodeKey !== "start") {
          worldState.whiteUmbrellaMet = true;
        }

        sceneNameEl.textContent = scene.name;
        sceneRoleEl.textContent = scene.role || "我的角色：未知旅人";
        const pathText = currentPathChoices.length > 0 ? `当前路径：${scene.name} / ${currentPathChoices.join(" / ")}` : `当前路径：${scene.name} / 起点`;
        scenePathEl.textContent = pathText;
        typeWriter(node.narrative);

        dialogsEl.innerHTML = "";
        node.dialogs.forEach((d) => {
          const bubble = document.createElement("div");
          bubble.className = `bubble ${d.role}`;
          const speaker = d.role === "me" ? "你" : (scene.npcName || "角色");
          bubble.innerHTML = `<span class="speaker">${speaker}</span>${d.text}`;
          dialogsEl.appendChild(bubble);
        });

        choicesEl.innerHTML = "";
        const visibleChoices = node.choices.filter((c) => {
          if (!c.require) return true;
          if (c.require === "whiteUmbrellaMet") return worldState.whiteUmbrellaMet;
          if (c.require === "highEmpathy") return worldState.empathy >= 4;
          if (c.require === "highLogic") return worldState.logic >= 4;
          if (c.require === "highRebel") return worldState.rebel >= 4;
          return true;
        });

        visibleChoices.forEach((c) => {
          const btn = document.createElement("button");
          btn.className = `choice ${classByType(c.type)}`;
          btn.textContent = c.text;
          btn.addEventListener("click", () => {
            if (c.type === "empathy") worldState.empathy += 1;
            if (c.type === "logic") worldState.logic += 1;
            if (c.type === "rebel") worldState.rebel += 1;
            updateHud();
            if (c.next) {
              currentPathChoices.push(c.text);
              renderSceneNode(scene, c.next);
              return;
            }
            if (c.ending) {
              currentPathChoices.push(c.text);
              const end = scene.endings[c.ending];
              if (end) showEnding(end.title, end.text, `${scene.id}:${c.ending}`);
            }
          });
          choicesEl.appendChild(btn);
        });
      }

      function startScene(sceneId) {
        const scene = scenes.find((s) => s.id === sceneId);
        if (!scene) return;
        currentSceneId = sceneId;
        currentNodeKey = "start";
        currentPathChoices = [];

        const sourceCard = homeEl.querySelector(`button[data-id="${sceneId}"]`)?.closest(".card");
        if (sourceCard) {
          sourceCard.style.transform = "scale(0.98)";
          sourceCard.style.opacity = "0";
        }

        setTimeout(() => {
          selectView.style.display = "none";
          endingEl.style.display = "none";
          storyEl.style.display = "block";
          renderSceneNode(scene, "start");

          if (sourceCard) {
            sourceCard.style.transform = "";
            sourceCard.style.opacity = "";
          }
        }, 260);
      }

      function showEnding(title, text, endingId) {
        if (endingId) {
          worldState.unlockedEndings.add(endingId);
        }
        if (currentSceneId && currentSceneId !== hiddenScene.id) {
          worldState.unlockedScenes.add(currentSceneId);
        }
        tryUnlockTrueEnding();
        updateHud();
        renderCards();
        renderGallery();
        saveState();

        storyEl.style.display = "none";
        endingEl.style.display = "block";
        endTitleEl.textContent = title;
        endTextEl.textContent = text;

        const themes = [
          "theme-rain",
          "theme-letter",
          "theme-night",
          "theme-dawn",
          "theme-true",
          "theme-rain-heal",
          "theme-rain-deep",
          "theme-letter-warm",
          "theme-letter-cool",
          "theme-city-light",
          "theme-city-glow",
          "theme-dawn-gold",
          "theme-dawn-rose",
          "theme-archive"
        ];
        endArtEl.classList.remove(...themes);
        const id = endingId || "";
        const ENDING_THEME_MAP = {
          "crossroad:rain_heal": "theme-rain-heal",
          "crossroad:paper_farewell": "theme-letter-cool",
          "crossroad:clear_end": "theme-rain-deep",
          "crossroad:guardian_ghost": "theme-night",
          "crossroad:easter_wander": "theme-city-light",
          "crossroad:dawn_release": "theme-dawn-gold",
          "crossroad:door_umbrella": "theme-rain-heal",
          "crossroad:nameless_warmth": "theme-letter-warm",
          "crossroad:final_message": "theme-rain-deep",
          "crossroad:dawn_guard": "theme-night",
          "crossroad:night_helper": "theme-city-light",
          "crossroad:umbrella_legacy": "theme-dawn-rose",

          "riverside:letter_to_self": "theme-letter-warm",
          "riverside:late_confession": "theme-letter-cool",
          "riverside:blank_heartbeat": "theme-dawn",
          "riverside:bridge_goodbye": "theme-dawn-rose",
          "riverside:mutual_love": "theme-city-glow",
          "riverside:mailbox_miracle": "theme-letter-cool",
          "riverside:youth_archive": "theme-archive",
          "riverside:delayed_letter": "theme-letter-cool",
          "riverside:drawer_moonlight": "theme-night",
          "riverside:rain_restart": "theme-rain-heal",
          "riverside:door_crack_letter": "theme-letter-warm",
          "riverside:ten_minutes": "theme-city-glow",

          "station:flower_wind": "theme-dawn-gold",
          "station:flower_desk": "theme-dawn-rose",
          "station:morning_train": "theme-city-light",
          "station:sealed_letter": "theme-archive",
          "station:night_announcement": "theme-night",
          "station:new_terminal": "theme-dawn-gold",

          "bookstore:night_reading": "theme-city-light",
          "bookstore:steady_revival": "theme-dawn-rose",
          "bookstore:balanced_store": "theme-archive",
          "bookstore:curated_bloom": "theme-city-glow",
          "bookstore:week_break": "theme-dawn-gold",
          "bookstore:one_hour_light": "theme-letter-warm",

          "memory_hub:true_resonance": "theme-true",
          "memory_hub:true_balance": "theme-true",
          "memory_hub:true_rewrite": "theme-true"
        };

        endArtEl.classList.add(ENDING_THEME_MAP[id] || "theme-dawn");

        const ENDING_ICON_MAP = {
          "crossroad:rain_heal": "☂",
          "crossroad:paper_farewell": "✉",
          "crossroad:clear_end": "⟡",
          "crossroad:guardian_ghost": "◌",
          "crossroad:easter_wander": "↺",
          "crossroad:dawn_release": "☼",
          "crossroad:door_umbrella": "⌂",
          "crossroad:nameless_warmth": "✉",
          "crossroad:final_message": "⋯",
          "crossroad:dawn_guard": "◔",
          "crossroad:night_helper": "➹",
          "crossroad:umbrella_legacy": "☂",

          "riverside:letter_to_self": "✎",
          "riverside:late_confession": "✉",
          "riverside:blank_heartbeat": "◦",
          "riverside:bridge_goodbye": "⟢",
          "riverside:mutual_love": "♡",
          "riverside:mailbox_miracle": "✉",
          "riverside:youth_archive": "☽",
          "riverside:delayed_letter": "⌛",
          "riverside:drawer_moonlight": "☾",
          "riverside:rain_restart": "☔",
          "riverside:door_crack_letter": "✎",
          "riverside:ten_minutes": "◷",

          "station:flower_wind": "❀",
          "station:flower_desk": "✿",
          "station:morning_train": "⟶",
          "station:sealed_letter": "⎙",
          "station:night_announcement": "⌁",
          "station:new_terminal": "◎",

          "bookstore:night_reading": "📖",
          "bookstore:steady_revival": "☕",
          "bookstore:balanced_store": "☷",
          "bookstore:curated_bloom": "✦",
          "bookstore:week_break": "⌂",
          "bookstore:one_hour_light": "◉",

          "memory_hub:true_resonance": "✦",
          "memory_hub:true_balance": "✧",
          "memory_hub:true_rewrite": "✶"
        };

        endArtIconEl.textContent = ENDING_ICON_MAP[id] || "✦";
      }

      document.getElementById("enterBtn").addEventListener("click", toSelectScreen);
      toggleScenes.addEventListener("click", toggleCards);
      document.getElementById("backToSelect").addEventListener("click", showSelectView);
      document.getElementById("homeBtn").addEventListener("click", showSelectView);
      document.getElementById("retry").addEventListener("click", () => startScene(currentSceneId));
      document.getElementById("openGalleryBtn").addEventListener("click", () => {
        window.location.href = "endings.html";
      });
      document.getElementById("resetProgressBtn").addEventListener("click", resetProgress);
      sceneFilter.addEventListener("change", () => {
        galleryState.sceneId = sceneFilter.value;
        renderGallery();
      });
      filterAllBtn.addEventListener("click", () => setGalleryMode("all"));
      filterUnlockedBtn.addEventListener("click", () => setGalleryMode("unlocked"));
      filterLockedBtn.addEventListener("click", () => setGalleryMode("locked"));
      filterTrueBtn.addEventListener("click", () => setGalleryMode("true"));

      loadState();
      if (worldState.trueEndUnlocked && !scenes.find((s) => s.id === hiddenScene.id)) {
        scenes.push(hiddenScene);
      }
      welcomeScreen.classList.remove("hidden");
      selectScreen.classList.add("hidden");
      updateHud();
      renderCards();
      renderSceneFilterOptions();
      renderGallery();
    </script>
  </body>
</html>
